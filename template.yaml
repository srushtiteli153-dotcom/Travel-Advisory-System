AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Travel Advisory System
  SAM Template for deploying the serverless travel advisory backend.

Parameters:
  GmailUser:
    Type: String
    Description: Gmail address to send advisories from
    Default: ""
  GmailAppPassword:
    Type: String
    NoEcho: true
    Description: 16-letter Gmail App Password
    Default: ""

Resources:
  # ──────────────────────────────────────────────────────────────
  # DynamoDB Table
  # ──────────────────────────────────────────────────────────────
  TravelAdvisoriesTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: record_id
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  SubscribersTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: subscription_id
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  # ──────────────────────────────────────────────────────────────
  # Lambda Function
  # ──────────────────────────────────────────────────────────────
  TravelAdvisoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Runtime: python3.11
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref TravelAdvisoriesTable
          SUBSCRIBERS_TABLE: !Ref SubscribersTable
          GMAIL_USER: !Ref GmailUser
          GMAIL_APP_PASSWORD: !Ref GmailAppPassword
      Policies:
        # Give Lambda permission to write to DynamoDB
        - DynamoDBCrudPolicy:
            TableName: !Ref TravelAdvisoriesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SubscribersTable
      Events:
        # Schedule to run every hour
        HourlySchedule:
          Type: Schedule
          Properties:
            Schedule: "rate(1 hour)"
            Name: "TravelAdvisoryHourlySchedule"
            Description: "Triggers the Travel Advisory System every hour"

Outputs:
  TravelAdvisoryFunctionArn:
    Description: "Travel Advisory Lambda Function ARN"
    Value: !GetAtt TravelAdvisoryFunction.Arn
  TravelAdvisoriesTableName:
    Description: "DynamoDB Table Name"
    Value: !Ref TravelAdvisoriesTable
  SubscribersTableName:
    Description: "Subscribers DynamoDB Table Name"
    Value: !Ref SubscribersTable
